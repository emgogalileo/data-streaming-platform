<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Streaming Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-info">
                <h1>Real-Time Data Streaming</h1>
                <p>Kafka & Spark Stream Processing Monitor</p>
            </div>
            <div class="status-badge">
                <span class="dot pulse-blue"></span> Cluster Online
            </div>
        </header>

        <section class="metrics-grid">
            <div class="metric-card">
                <h3>Throughput</h3>
                <div class="metric-value"><span id="throughput-val">12,450</span> <span class="unit">msg/s</span></div>
                <div class="sparkline" id="throughput-spark"></div>
            </div>
            <div class="metric-card">
                <h3>Latencia Promedio</h3>
                <div class="metric-value"><span id="latency-val">42</span> <span class="unit">ms</span></div>
                <div class="sparkline" id="latency-spark"></div>
            </div>
            <div class="metric-card alert-state">
                <h3>Error Rate</h3>
                <div class="metric-value"><span id="error-val">0.01</span> <span class="unit">%</span></div>
                <div class="sparkline" id="error-spark"></div>
            </div>
        </section>

        <section class="main-content">
            <div class="chart-panel">
                <h2>Ingestión en Tiempo Real</h2>
                <div class="bar-chart" id="ingestion-chart">
                    <!-- Barras dinámicas -->
                </div>
            </div>
            
            <div class="log-panel">
                <h2>Live Event Stream</h2>
                <div class="terminal" id="event-terminal">
                    <!-- Logs autoscroll -->
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
